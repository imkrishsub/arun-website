<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arun Murugan — variant switcher</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e0e0e0;
    }

    /* ── Top bar ── */
    .topbar {
      flex-shrink: 0;
      height: 44px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 10;
    }
    .topbar-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #555;
    }
    .topbar-name {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .topbar-desc {
      font-size: 12px;
      color: #555;
    }
    .topbar-sep { color: #333; }
    .topbar-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 3px;
      margin-left: auto;
    }
    .topbar-badge.ui      { background: #1d3a5c; color: #7aaddf; }
    .topbar-badge.content { background: #1a4030; color: #6ec99a; }

    /* ── Body split ── */
    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      flex-shrink: 0;
      width: 210px;
      background: #141414;
      border-right: 1px solid #242424;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #444;
      padding: 16px 14px 6px;
    }

    .variant-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-left: 3px solid transparent;
      padding: 10px 14px 10px 11px;
      cursor: pointer;
      color: #999;
      transition: background .1s, border-color .1s, color .1s;
      position: relative;
    }
    .variant-btn:hover {
      background: #1c1c1c;
      color: #e0e0e0;
    }
    .variant-btn.active {
      background: #1e1e1e;
      color: #fff;
    }

    /* left accent bar colour set per variant via data-color */
    .variant-btn.active  { border-left-color: var(--c); }
    .variant-btn:hover:not(.active) { border-left-color: #333; }

    .vb-swatch {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--c);
      margin-right: 7px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .vb-name {
      font-size: 12px;
      font-weight: 600;
      display: block;
      margin-bottom: 2px;
    }
    .vb-desc {
      font-size: 11px;
      color: #555;
      display: block;
      line-height: 1.4;
    }
    .variant-btn.active .vb-desc { color: #777; }

    .vb-type {
      position: absolute;
      top: 9px;
      right: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
    }
    .vb-type.ui      { background: #162438; color: #5a8ec0; }
    .vb-type.content { background: #162414; color: #5aaa7a; }

    .sidebar-footer {
      margin-top: auto;
      padding: 14px;
      border-top: 1px solid #1f1f1f;
      font-size: 11px;
      color: #3a3a3a;
      line-height: 1.5;
    }

    /* ── iframe ── */
    .preview {
      flex: 1;
      position: relative;
      background: #0a0a0a;
    }
    .preview iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Loading overlay ── */
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-size: 12px;
      color: #333;
      letter-spacing: 1px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .1s;
    }
    .loading.visible { opacity: 1; pointer-events: all; }

    /* ── Scrollbar ── */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-label">Viewing</span>
  <span class="topbar-name" id="tb-name">Financial terminal</span>
  <span class="topbar-sep">—</span>
  <span class="topbar-desc" id="tb-desc">Dark, monospace, stock-market metaphors throughout</span>
  <span class="topbar-badge ui" id="tb-badge">UI variant</span>
</div>

<div class="body">
  <nav class="sidebar">

    <div class="sidebar-section-label">Design variants</div>

    <button class="variant-btn active"
      style="--c:#f0b429"
      data-src="index.html"
      data-name="Financial terminal"
      data-desc="Dark, monospace, stock-market metaphors throughout"
      data-type="ui">
      <span class="vb-swatch"></span>
      <span class="vb-name">Financial terminal</span>
      <span class="vb-desc">Dark · gold ticker · trading metaphors</span>
      <span class="vb-type ui">UI</span>
    </button>

    <button class="variant-btn"
      style="--c:#3b82f6"
      data-src="variant-minimal.html"
      data-name="Clean & minimal"
      data-desc="Light background, card layout, system sans-serif"
      data-type="ui">
      <span class="vb-swatch"></span>
      <span class="vb-name">Clean &amp; minimal</span>
      <span class="vb-desc">Light · blue accent · card-based</span>
      <span class="vb-type ui">UI</span>
    </button>

    <button class="variant-btn"
      style="--c:#c0191a"
      data-src="variant-editorial.html"
      data-name="Broadsheet editorial"
      data-desc="Aged paper, ink black, Georgia serif, newspaper layout"
      data-type="ui">
      <span class="vb-swatch"></span>
      <span class="vb-name">Broadsheet editorial</span>
      <span class="vb-desc">Paper · red accent · newspaper columns</span>
      <span class="vb-type ui">UI</span>
    </button>

    <button class="variant-btn"
      style="--c:#39ff14"
      data-src="variant-terminal.html"
      data-name="CLI / terminal"
      data-desc="Green-on-black, command-prompt framing, ASCII header"
      data-type="ui">
      <span class="vb-swatch"></span>
      <span class="vb-name">CLI / terminal</span>
      <span class="vb-desc">Black · neon green · command prompt</span>
      <span class="vb-type ui">UI</span>
    </button>

    <div class="sidebar-section-label" style="margin-top:4px;">Content variants</div>

    <button class="variant-btn"
      style="--c:#6ec99a"
      data-src="variant-conservative.html"
      data-name="Professional / conservative"
      data-desc="Standard professional language, no financial metaphors, serif body text"
      data-type="content">
      <span class="vb-swatch"></span>
      <span class="vb-name">Professional</span>
      <span class="vb-desc">Straight CV language · no metaphors</span>
      <span class="vb-type content">Content</span>
    </button>

    <div class="sidebar-footer">
      5 variants total<br />4 design · 1 content
    </div>
  </nav>

  <div class="preview">
    <div class="loading" id="loading">Loading…</div>
    <iframe id="frame" src="index.html" title="Variant preview"></iframe>
  </div>
</div>

<script>
  const frame   = document.getElementById('frame');
  const loading = document.getElementById('loading');
  const tbName  = document.getElementById('tb-name');
  const tbDesc  = document.getElementById('tb-desc');
  const tbBadge = document.getElementById('tb-badge');
  const buttons = document.querySelectorAll('.variant-btn');

  frame.addEventListener('load', () => loading.classList.remove('visible'));

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('active')) return;

      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const src  = btn.dataset.src;
      const name = btn.dataset.name;
      const desc = btn.dataset.desc;
      const type = btn.dataset.type;

      tbName.textContent  = name;
      tbDesc.textContent  = desc;
      tbBadge.textContent = type === 'ui' ? 'UI variant' : 'Content variant';
      tbBadge.className   = 'topbar-badge ' + type;

      loading.classList.add('visible');
      frame.src = src;
    });
  });
</script>
</body>
</html>
